<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Map</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="topbar-info">
          <h1>Community Map</h1>
          <section class="topbar-legend" aria-label="Point color legend">
            <div class="legend-item">
              <span class="legend-dot legend-dot-fresh"></span>
              <span id="legend-fresh-label"></span>
            </div>
            <div class="legend-item">
              <span class="legend-dot legend-dot-mid"></span>
              <span id="legend-mid-label"></span>
            </div>
            <div class="legend-item">
              <span class="legend-dot legend-dot-expiring"></span>
              <span id="legend-expiring-label"></span>
            </div>
          </section>
        </div>
        <button id="refresh">Refresh</button>
      </header>
      <main>
        <section id="map"></section>
        <aside id="panel">
          <h2>Comments</h2>
          <p id="panel-status">Select a marker to view comments.</p>
          <div id="comments"></div>
        </aside>
      </main>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
