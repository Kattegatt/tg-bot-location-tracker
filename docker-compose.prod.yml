services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: community_map
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d community_map"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/community_map
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_API_TOKEN: ${BOT_API_TOKEN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      INITDATA_MAX_AGE_SECONDS: ${INITDATA_MAX_AGE_SECONDS:-86400}
      CORS_ORIGIN: https://${APP_DOMAIN:-app.communitymap.website}
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      API_URL: https://${API_DOMAIN:-api.communitymap.website}
      BOT_API_TOKEN: ${BOT_API_TOKEN}
      WEBAPP_URL: https://${APP_DOMAIN:-app.communitymap.website}
      WEBAPP_CACHE_BUST: ${WEBAPP_CACHE_BUST:-1}
      DONATE_MONO_CARD: ${DONATE_MONO_CARD:-}
      DONATE_CRYPTO_WALLET: ${DONATE_CRYPTO_WALLET:-}
      LOG_LEVEL: info
    depends_on:
      - api
    networks:
      - appnet

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./webapp-dist:/srv/webapp:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - appnet

networks:
  appnet:

volumes:
  db_data:
  caddy_data:
  caddy_config:
